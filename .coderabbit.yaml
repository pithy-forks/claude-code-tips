# coderabbit reviews disabled in favor of the ai-review-team workflow.
# full uninstall: github repo settings -> integrations -> installed github apps.
# this file stops any future coderabbit runs that would be triggered
# automatically by the app before it is removed from the repo.
reviews:
  auto_review:
    enabled: false
    drafts: false
  request_changes_workflow: false
  high_level_summary: false
  poem: false
  review_status: false
chat:
  auto_reply: false
knowledge_base:
  opt_out: true
